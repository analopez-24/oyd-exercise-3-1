name: Terraform CI

on:
  pull_request:
    branches:
      - main

permissions:
  pull-requests: write

env:
  AWS_REGION: us-west-2

jobs:
  terraform:
    name: Terraform Lint, Validate & Plan
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~> 1.8"

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ env.AWS_REGION }}

      - name: Terraform Format Check
        run: terraform fmt --check -recursive

      - name: Terraform Init
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        id: plan
        run: terraform plan -var-file=envs/dev/dev.tfvars -no-color 2>&1 | tee plan_output.txt
        continue-on-error: true

      - name: Post plan as PR comment
        if: always()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const plan = fs.readFileSync('${{ github.workspace }}/infra/plan_output.txt', 'utf8');
            const output = `### Terraform Plan

            <details>
            <summary>Click to expand</summary>

            \`\`\`hcl
            ${plan}
            \`\`\`

            </details>

            *Plan generated by GitHub Actions — workflow: \`${{ github.workflow }}\`, run: \`${{ github.run_id }}\`*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: output
            });

      - name: Fail if plan failed
        if: steps.plan.outcome == 'failure'
        run: exit 1
